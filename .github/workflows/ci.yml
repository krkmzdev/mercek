name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    # Dummy connection string so `prisma generate` can resolve DATABASE_URL.
    # Generate does not connect; CI never touches a real database.
    env:
      DATABASE_URL: postgresql://mercek:mercek@localhost:5432/mercek
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @mercek/db db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: SDK independence (§4)
        run: pnpm check:sdk

      # Derleme kırılmalarını yakalar. Yalnız API route ve force-dynamic rapor
      # sayfası DB kullanır; ikisi de prerender edilmediği için sahte
      # DATABASE_URL yeterli, gerçek bir bağlantı gerekmez.
      - name: Build (web)
        run: pnpm --filter @mercek/web build
